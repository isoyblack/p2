            arrow.textContent = '▲';
            contentEl.style.maxHeight = "3000px";
            // 待 0.3 秒動畫播完後，完全釋放高度限制
            setTimeout(() => {
                if (!titleEl.classList.contains('collapsed')) {
                    contentEl.style.maxHeight = "none";
                }
            }, 300);
        } else {
            // 執行收縮
            contentEl.style.maxHeight = contentEl.scrollHeight + "px";
            // 強制重繪以觸發過渡動畫
            contentEl.offsetHeight; 
            titleEl.classList.add('collapsed');
            arrow.textContent = '▼';
            contentEl.style.maxHeight = "0px";
        }
    }

    function getRankClass(level) {
        if (level <= 2) return 'color-rank-1';
        if (level <= 4) return 'color-rank-2';
        if (level <= 6) return 'color-rank-3';
        if (level <= 8) return 'color-rank-4';
        return 'color-rank-5';
    }

    function getStockCount(name) {
        return parseInt(localStorage.getItem('stock_' + name)) || 0;
    }
    function updateStockCount(name, change) {
        let val = getStockCount(name) + change;
        if (val < 0) val = 0;
        localStorage.setItem('stock_' + name, val);
        renderRareTagsAlert();
    }

    const tagGroupDiv = document.getElementById('tagGroup');
    allTags.forEach(tag => {
        const label = document.createElement('label');
        label.className = 'tag-label';
        label.setAttribute('data-tag', tag);
        label.innerHTML = `<input type="checkbox" value="${tag}" onchange="calculateLogic()">${tag}`;
        tagGroupDiv.appendChild(label);
    });

    const foodTbody = document.getElementById('foodTableBody');
    const wineTbody = document.getElementById('wineTableBody');
    
    function renderRareTagsAlert() {
        const rareContent = document.getElementById('rareListContent');
        const tagCounts = {};
        allTags.forEach(t => tagCounts[t] = { count: 0, items: [] });

        productData.forEach(p => {
            if (p.level <= currentUserLevel) {
                p.tags.forEach(t => {
                    tagCounts[t].count++;
                    tagCounts[t].items.push({ name: p.name, level: p.level });
                });
            }
        });

        let rareHtml = "";
        let hasRare = false;

        Object.keys(tagCounts).sort((a,b) => tagCounts[a].count - tagCounts[b].count).forEach(tag => {
            const info = tagCounts[tag];
            if (info.count > 0 && info.count <= 2) {
                hasRare = true;
                
                let itemsString = info.items.map(item => {
                    const count = getStockCount(item.name);
                    const shopHint = (item.level <= 2) ? `<span style="color:#60a5fa; font-weight:normal; font-size:11px; margin-left:4px;">🏪商店直購</span>` : '';
                    const rankClass = getRankClass(item.level);
                    
                    return `<div style="margin-left: 15px; margin-top: 2px;">
                        → <span class="${rankClass}" style="font-weight:bold;">${item.name}</span>${shopHint}
                        <span style="margin-left:10px;">
                            <button class="counter-btn" onclick="updateStockCount('${item.name}', -1)">-</button>
                            <span class="counter-val">${count}</span>
                            <button class="counter-btn" onclick="updateStockCount('${item.name}', 1)">+</button>
                        </span>
                    </div>`;
                }).join('');

                rareHtml += `<div class="rare-item">
                    <div class="rare-header">
                        <span>🏷️ 標籤【<span class="interactive-item" data-type="tag" data-value="${tag}" style="margin:0; padding:1px 5px; background:#2e3440; border-color:#4c566a; color:#d8dee9;">${tag}</span>】極稀有：</span>
                    </div>
                    ${itemsString}
                </div>`;
            }
        });

        if (!hasRare) {
            rareHtml = "<span style='color:#888;'>當前等級內暫無高度稀有的孤品標籤。</span>";
        }
        rareContent.innerHTML = rareHtml;

        rareContent.querySelectorAll('.interactive-item').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                triggerHighlight(this.getAttribute('data-type'), this.getAttribute('data-value'));
            });
        });
    }

    function renderTable() {
        foodTbody.innerHTML = '';
        wineTbody.innerHTML = '';

        productData.forEach((product, idx) => {
            if (product.level > currentUserLevel) return;
            
            const tr = document.createElement('tr');
            tr.setAttribute('data-idx', idx);
            
            let levelDisplay = product.level;
            if (product.level === 1 || product.level === 2) {
                levelDisplay = `<span class="shop-level">🏪 ${product.level}</span>`;
            }

            let tagsHtml = product.tags.map(t => `<span class="interactive-item" data-type="tag" data-value="${t}">${t}</span>`).join('');
            if(product.tags.length === 0) tagsHtml = '<span style="color:#555;">-</span>';

            let itemsHtml = product.items.map(i => {
                const coreName = i.replace(/[0-9]/g, '');
                return `<span class="interactive-item" data-type="item" data-value="${coreName}">${i}</span>`;
            }).join('');
            if(product.items.length === 0) itemsHtml = '<span style="color:#555;">-</span>';

            const rankClass = getRankClass(product.level);

            tr.innerHTML = `
                <td class="${rankClass}" style="font-weight:bold;">${product.name}</td>
                <td><span class="type-badge ${product.type === '料理' ? 'type-food' : 'type-wine'}">${product.type}</span></td>
                <td>${levelDisplay}</td>
                <td>${tagsHtml}</td>
                <td>${itemsHtml}</td>
            `;

            if (product.type === '料理') {
                foodTbody.appendChild(tr);
            } else {
                wineTbody.appendChild(tr);
            }
        });

        document.querySelectorAll('tbody .interactive-item').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                triggerHighlight(this.getAttribute('data-type'), this.getAttribute('data-value'));
            });
        });

        if (currentHighlightText) refreshHighlightUI();
    }

    function triggerHighlight(type, value) {
        if (currentHighlightText === value && currentHighlightType === type) {
            currentHighlightText = null;
            currentHighlightType = null;
        } else {
            currentHighlightText = value;
            currentHighlightType = type;
        }
        refreshHighlightUI();
    }

    function refreshHighlightUI() {
        const rows = document.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const idx = row.getAttribute('data-idx');
            const product = productData[idx];
            row.classList.remove('highlighted-row');
            
            let isRowMatch = false;
            if (currentHighlightText) {
                if (currentHighlightType === 'tag' && product.tags.includes(currentHighlightText)) isRowMatch = true;
                else if (currentHighlightType === 'item') {
                    if (product.items.some(i => i.replace(/[0-9]/g, '') === currentHighlightText)) isRowMatch = true;
                }
            }
            if (isRowMatch) row.classList.add('highlighted-row');
        });

        document.querySelectorAll('.interactive-item').forEach(el => {
            if (currentHighlightText && el.getAttribute('data-type') === currentHighlightType && el.getAttribute('data-value') === currentHighlightText) {
                el.classList.add('active-highlight');
            } else {
                el.classList.remove('active-highlight');
            }
        });

        document.querySelectorAll('.tag-label').forEach(label => {
            const tagValue = label.getAttribute('data-tag');
            if (currentHighlightText && currentHighlightType === 'tag' && tagValue === currentHighlightText) {
                label.classList.add('active-highlight');
            } else {
                label.classList.remove('active-highlight');
            }
        });
    }

    function handleLevelChange() {
        currentUserLevel = parseInt(document.getElementById('userLevelSelect').value);
        renderRareTagsAlert(); 
        renderTable();
        calculateLogic();
    }

    function calculateLogic() {
        const checkedLabels = document.querySelectorAll('.tag-label');
        const activeTags = [];
        
        checkedLabels.forEach(label => {
            const input = label.querySelector('input');
            if (input.checked) {
                label.classList.add('checked');
                activeTags.push(input.value);
            } else {
                label.classList.remove('checked');
            }
        });

        const recBox = document.getElementById('recommendBox');
        const recContent = document.getElementById('recommendContent');

        if (activeTags.length === 0) {
            recBox.style.display = 'none';
            return;
        }

        recBox.style.display = 'block';
        const availablePool = productData.filter(p => p.level <= currentUserLevel);

        let scoredProducts = availablePool.map(p => {
            const matchCount = p.tags.filter(t => activeTags.includes(t)).length;
            return { ...p, matchCount };
        }).filter(p => p.matchCount > 0);

        scoredProducts.sort((a, b) => b.matchCount - a.matchCount || a.level - b.level);

        let html = "";
        if (scoredProducts.length === 0) {
            html = `⚠️ 在您目前的家業等級限制下，沒有任何菜品符合勾選標籤。`;
            recContent.innerHTML = html;
            return;
        }

        html += `<strong>🎯 優先推薦單品：</strong><br><ul style="margin:5px 0 15px 20px; padding:0;">`;
        const maxMatch = scoredProducts[0].matchCount;
        scoredProducts.forEach(p => {
            if (p.matchCount === maxMatch) {
                const shopHint = (p.level <= 2) ? " <span style='color:#60a5fa;'>[🏪 商店直接拉]</span>" : "";
                html += `<li style="margin-bottom:4px;"><span style="color:#fff; font-weight:bold;">${p.name}</span> (${p.type}) - Lv.${p.level}${shopHint} <span class="match-badge">符合 ${p.matchCount} 個標籤</span></li>`;
            }
        });
        html += `</ul>`;

        html += `<strong>💡 最省力組合建議：</strong><br>`;
        let uncoveredTags = [...activeTags];
        let comboList = [];
        let pool = availablePool.map(p => ({
            ...p,
            getMatches: function(tags) { return this.tags.filter(t => tags.includes(t)); }
        }));

        while (uncoveredTags.length > 0) {
            pool.sort((a, b) => b.getMatches(uncoveredTags).length - a.getMatches(uncoveredTags).length || a.level - b.level);
            let best = pool[0];
            let matches = best ? best.getMatches(uncoveredTags) : [];
            if (!best || matches.length === 0) break; 

            comboList.push({ name: best.name, type: best.type, level: best.level, covered: matches });
            uncoveredTags = uncoveredTags.filter(t => !matches.includes(t));
        }

        if (comboList.length > 0) {
            html += `<div style="background:#111827; padding:10px; border-radius:6px; border:1px solid #374151; margin-top:5px;">`;
            comboList.forEach((c, i) => {
                const shopHint = (c.level <= 2) ? " <span style='color:#60a5fa; font-size:12px;'>[🏪 商店可拉]</span>" : "";
                html += `${i+1}. <span style="color:#fbbf24; font-weight:bold;">${c.name}</span> - Lv.${c.level}${shopHint} → 解決標籤: <span style="color:#a7f3d0;">${c.covered.join('、')}</span><br>`;
            });
            if (uncoveredTags.length > 0) {
                html += `<span style="color:#ef4444; font-size:12px; font-weight:bold; display:block; margin-top:5px;">⚠️ 剩餘標籤 [ ${uncoveredTags.join('、')} ] 當前等級內無解。</span>`;
            }
            html += `</div>`;
        }
        recContent.innerHTML = html;
    }

    renderRareTagsAlert();
    renderTable();
</script>

</body>
</html>
