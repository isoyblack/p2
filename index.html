        { name: { zh: "紫茄河豚辣膾" }, type: "料理", level: 7, tags: { zh: ["麻辣", "炒菜"] }, items: { zh: ["茄子6", "辣椒3", "河豚2"] } },
        { name: { zh: "辣子麥飯" }, type: "料理", level: 7, tags: { zh: ["香辣", "炒飯"] }, items: { zh: ["小麥6", "辣椒3", "豬肉2"] } },
        { name: { zh: "參炒胡蘿蔔" }, type: "料理", level: 8, tags: { zh: ["香辣", "炒菜"] }, items: { zh: ["胡蘿蔔6", "辣椒3", "野山參2"] } },
        { name: { zh: "山參辣茄膾" }, type: "料理", level: 8, tags: { zh: ["香辣", "小吃"] }, items: { zh: ["茄子6", "辣椒3", "野山參2"] } },
        { name: { zh: "辣炙鯉魚" }, type: "料理", level: 8, tags: { zh: ["香辣", "燒烤"] }, items: { zh: ["洋蔥6", "辣椒3", "鯉魚2"] } },
        { name: { zh: "馬鈴薯炒魚酥" }, type: "料理", level: 8, tags: { zh: ["酥脆", "炒菜"] }, items: { zh: ["馬鈴薯6", "辣椒3", "鯉魚2"] } },
        { name: { zh: "茶辣鯽魚膾" }, type: "料理", level: 9, tags: { zh: ["醬香", "燜菜"] }, items: { zh: ["茶樹6", "辣椒3", "鯽魚2"] } },
        { name: { zh: "辣伴菜菇" }, type: "料理", level: 9, tags: { zh: ["香辣", "小吃"] }, items: { zh: ["生菜6", "辣椒3", "蕈菇2"] } },
        { name: { zh: "香烤兔肉" }, type: "料理", level: 9, tags: { zh: ["鹹香", "燒烤"] }, items: { zh: ["生菜6", "辣椒3", "兔肉2"] } },
        { name: { zh: "香辣鹿肉" }, type: "料理", level: 9, tags: { zh: ["香辣", "炒菜"] }, items: { zh: ["茶樹6", "辣椒3", "大麋肉2"] } },
        { name: { zh: "番茄燴兔丁" }, type: "料理", level: 10, tags: { zh: ["燴菜", "炒菜"] }, items: { zh: ["番茄6", "辣椒3", "兔肉2"] } },
        { name: { zh: "豆酥煨鯰腩" }, type: "料理", level: 10, tags: { zh: ["燜菜", "醇香"] }, items: { zh: ["大豆6", "辣椒3", "鯰魚2"] } },
        { name: { zh: "野鴇炒黃瓜" }, type: "料理", level: 10, tags: { zh: ["鮮香", "炒菜"] }, items: { zh: ["黃瓜6", "辣椒3", "野鴇肉2"] } },
        { name: { zh: "鯚魚伴生菜" }, type: "料理", level: 10, tags: { zh: ["鮮香", "蒸煮"] }, items: { zh: ["生菜6", "辣椒3", "鯚魚2"] } },
        { name: { zh: "麥酒" }, type: "酒", level: 1, tags: { zh: ["糧食酒"] }, items: { zh: ["小麥6", "玉米3", "容器1"] } },
        { name: { zh: "苞穀酒" }, type: "酒", level: 2, tags: { zh: ["糧食酒"] }, items: { zh: ["梨花6", "玉米3", "容器2"] } },
        { name: { zh: "桑落酒" }, type: "酒", level: 3, tags: { zh: ["混合酒"] }, items: { zh: ["棉花6", "玉米3", "容器3"] } },
        { name: { zh: "西瓜果釀" }, type: "酒", level: 4, tags: { zh: ["果酒"] }, items: { zh: ["寒瓜6", "水稻3", "容器4"] } },
        { name: { zh: "新豐酒" }, type: "酒", level: 5, tags: { zh: ["糧食酒"] }, items: { zh: ["油菜6", "水稻3", "容器5"] } },
        { name: { zh: "青紅酒" }, type: "酒", level: 6, tags: { zh: ["糧食酒"] }, items: { zh: ["番茄6", "水稻3", "容器6"] } },
        { name: { zh: "杜康酒" }, type: "酒", level: 7, tags: { zh: ["糧食酒"] }, items: { zh: ["甘蔗6", "高粱3", "容器7"] } },
        { name: { zh: "鵝黃酒" }, type: "酒", level: 8, tags: { zh: ["經濟作物酒"] }, items: { zh: ["枇杷6", "高粱3", "容器8"] } },
        { name: { zh: "松醪酒" }, type: "酒", level: 9, tags: { zh: ["經濟作物酒"] }, items: { zh: ["茶樹6", "高粱3", "容器9"] } },
        { name: { zh: "屠蘇酒" }, type: "酒", level: 10, tags: { zh: ["經濟作物酒"] }, items: { zh: ["櫻桃6", "高粱3", "容器10"] } }
    ];

    let currentHighlightText = null;
    let currentHighlightType = null;
    let currentUserLevel = 10;

    function applyLanguage() {
        const l = i18n[currentLang];
        document.getElementById('pageTitle').textContent = l.pageTitle;
        document.getElementById('mainTitle').textContent = l.mainTitle;
        document.getElementById('mainSubtitle').textContent = l.mainSubtitle;
        document.getElementById('lblUserLevel').textContent = l.lblUserLevel;
        document.getElementById('lblTagSectionTitle').textContent = l.lblTagSectionTitle;
        document.getElementById('lblRareSectionTitle').textContent = l.lblRareSectionTitle;
        document.getElementById('lblRecSectionTitle').textContent = l.lblRecSectionTitle;
        
        document.getElementById('titleContainerSection').textContent = l.titleContainerSection;
        document.getElementById('titleFoodSection').textContent = l.titleFoodSection;
        document.getElementById('titleWineSection').textContent = l.titleWineSection;
        
        document.querySelectorAll('.th-name').forEach(el => el.textContent = l.thName);
        document.querySelectorAll('.th-type').forEach(el => el.textContent = l.thType);
        document.querySelectorAll('.th-level').forEach(el => el.textContent = l.thLevel);
        document.querySelectorAll('.th-tags').forEach(el => el.textContent = l.thTags);
        document.querySelectorAll('.th-items').forEach(el => el.textContent = l.thItems);
        
        document.getElementById('navPromoBtn').textContent = l.navPromoBtn;
        document.getElementById('footerLinks').childNodes[0].nodeValue = l.footerLinks;

        const select = document.getElementById('userLevelSelect');
        for (let i = 0; i < 9; i++) {
            select.options[i].text = (i + 1) + l.levelText;
        }
        select.options[9].text = l.levelDisplayAll;
    }

    function toggleSection(id) {
        const titleEl = document.querySelector(`[onclick="toggleSection('${id}')"]`);
        const contentEl = document.getElementById(id);
        const arrow = titleEl.querySelector('.collapse-arrow');
        
        if (titleEl.classList.contains('collapsed')) {
            titleEl.classList.remove('collapsed');
            arrow.textContent = '▲';
            contentEl.style.maxHeight = "3000px";
            setTimeout(() => { if (!titleEl.classList.contains('collapsed')) contentEl.style.maxHeight = "none"; }, 300);
        } else {
            contentEl.style.maxHeight = contentEl.scrollHeight + "px";
            contentEl.offsetHeight; 
            titleEl.classList.add('collapsed');
            arrow.textContent = '▼';
            contentEl.style.maxHeight = "0px";
        }
    }

    function getRankClass(level) {
        if (level <= 2) return 'color-rank-1';
        if (level <= 4) return 'color-rank-2';
        if (level <= 6) return 'color-rank-3';
        if (level <= 8) return 'color-rank-4';
        return 'color-rank-5';
    }

    function getStockCount(name) {
        return parseInt(localStorage.getItem('inn_stock_' + name)) || 0;
    }
    function updateStockCount(name, change) {
        let val = getStockCount(name) + change;
        if (val < 0) val = 0;
        localStorage.setItem('inn_stock_' + name, val);
        renderRareTagsAlert();
    }

    function rebuildTagUI() {
        let allTags = new Set();
        productData.forEach(p => p.tags[currentLang].forEach(t => allTags.add(t)));
        allTags = [...allTags].sort();

        const tagGroupDiv = document.getElementById('tagGroup');
        tagGroupDiv.innerHTML = '';
        allTags.forEach(tag => {
            const label = document.createElement('label');
            label.className = 'tag-label';
            label.setAttribute('data-tag', tag);
            label.innerHTML = `<input type="checkbox" value="${tag}" onchange="calculateLogic()">${tag}`;
            tagGroupDiv.appendChild(label);
        });
    }

    function renderRareTagsAlert() {
        const l = i18n[currentLang];
        const rareContent = document.getElementById('rareListContent');
        
        let allTags = new Set();
        productData.forEach(p => p.tags[currentLang].forEach(t => allTags.add(t)));
        allTags = [...allTags].sort();

        const tagCounts = {};
        allTags.forEach(t => tagCounts[t] = { count: 0, items: [] });

        productData.forEach(p => {
            if (p.level <= currentUserLevel) {
                p.tags[currentLang].forEach(t => {
                    tagCounts[t].count++;
                    tagCounts[t].items.push({ name: p.name[currentLang], rawName: p.name['zh'], level: p.level });
                });
            }
        });

        let rareHtml = "";
        let hasRare = false;

        Object.keys(tagCounts).sort((a,b) => tagCounts[a].count - tagCounts[b].count).forEach(tag => {
            const info = tagCounts[tag];
            if (info.count > 0 && info.count <= 2) {
                hasRare = true;
                
                let itemsString = info.items.map(item => {
                    const count = getStockCount(item.rawName);
                    const shopHint = (item.level <= 2) ? `<span style="color:#60a5fa; font-weight:normal; font-size:11px; margin-left:4px;">${l.shopDirect}</span>` : '';
                    const rankClass = getRankClass(item.level);
                    
                    return `<div style="margin-left: 15px; margin-top: 2px;">
                        → <span class="${rankClass}" style="font-weight:bold;">${item.name}</span>${shopHint}
                        <span style="margin-left:10px;">
                            <button class="counter-btn" onclick="updateStockCount('${item.rawName}', -1)">-</button>
                            <span class="counter-val">${count}</span>
                            <button class="counter-btn" onclick="updateStockCount('${item.rawName}', 1)">+</button>
                        </span>
                    </div>`;
                }).join('');

                rareHtml += `<div class="rare-item">
                    <div class="rare-header">
                        <span>🏷️ ${l.rareAlertTag}【<span class="interactive-item" data-type="tag" data-value="${tag}" style="margin:0; padding:1px 5px; background:#2e3440; border-color:#4c566a; color:#d8dee9;">${tag}</span>】${l.rareAlertExt}</span>
                    </div>
                    ${itemsString}
                </div>`;
            }
        });

        if (!hasRare) {
            rareHtml = `<span style='color:#888;'>${l.noRare}</span>`;
        }
        rareContent.innerHTML = rareHtml;

        rareContent.querySelectorAll('.interactive-item').forEach(el => {
            el.addEventListener('click', function(e) { e.stopPropagation(); triggerHighlight(this.getAttribute('data-type'), this.getAttribute('data-value')); });
        });
    }

    function renderTable() {
        const l = i18n[currentLang];
        const containerTbody = document.getElementById('containerTableBody');
        const foodTbody = document.getElementById('foodTableBody');
        const wineTbody = document.getElementById('wineTableBody');
        
        containerTbody.innerHTML = '';
        foodTbody.innerHTML = '';
        wineTbody.innerHTML = '';

        // 1. 🏺 渲染容器獨立大表
        Object.keys(containerDatabase).forEach((key) => {
            const level = parseInt(key.replace("容器", ""));
            if (level > currentUserLevel) return;

            const dbInfo = containerDatabase[key];
            const tr = document.createElement('tr');
            tr.setAttribute('data-container-key', key);
            
            let levelDisplay = level + l.levelText;
            if (level === 1 || level === 2) levelDisplay = `<span class="shop-level">🏪 ${level}</span>`;
            
            const rankClass = getRankClass(level);
            
            let recipeHtml = dbInfo.recipe[currentLang].split('、').map(r => {
                const coreMat = r.replace(/[0-9]/g, '').trim();
                return `<span class="interactive-item" data-type="item" data-value="${coreMat}">${r}</span>`;
            }).join(' ');

            tr.innerHTML = `
                <td class="${rankClass}" style="font-weight:bold;">${dbInfo.name[currentLang]}</td>
                <td><span class="type-badge type-container">${currentLang === 'zh' ? '容器' : 'Box'}</span></td>
                <td>${levelDisplay}</td>
                <td>${recipeHtml}</td>
            `;
            containerTbody.appendChild(tr);
        });

        // 2. 🍳 & 🍶 渲染料理與酒水表
        productData.forEach((product, idx) => {
            if (product.level > currentUserLevel) return;
            
            const tr = document.createElement('tr');
            tr.setAttribute('data-idx', idx);
            
            let levelDisplay = product.level + l.levelText;
            if (product.level === 1 || product.level === 2) levelDisplay = `<span class="shop-level">🏪 ${product.level}</span>`;

            let tagsHtml = product.tags[currentLang].map(t => `<span class="interactive-item" data-type="tag" data-value="${t}">${t}</span>`).join('');
            if(product.tags[currentLang].length === 0) tagsHtml = '<span style="color:#555;">-</span>';

            let itemsHtml = product.items[currentLang].map((i, iIdx) => {
                const rawItemCode = product.items['zh'][iIdx];
                if (rawItemCode.startsWith("容器")) {
                    const dbInfo = containerDatabase[rawItemCode];
                    if (dbInfo) {
                        const hoverText = `【${dbInfo.name[currentLang]}】(Lv.${product.level})\n${dbInfo.recipe[currentLang]}`;
                        const rankClass = getRankClass(product.level);
                        return `<span class="interactive-item container-tip ${rankClass}" data-type="item" data-value="${rawItemCode}" title="${hoverText}">${dbInfo.name[currentLang]}</span>`;
                    }
                }
                const coreName = i.replace(/[0-9]/g, '').trim();
                return `<span class="interactive-item" data-type="item" data-value="${coreName}">${i}</span>`;
            }).join('');
            if(product.items[currentLang].length === 0) itemsHtml = '<span style="color:#555;">-</span>';

            const rankClass = getRankClass(product.level);

            tr.innerHTML = `
                <td class="${rankClass}" style="font-weight:bold;">${product.name[currentLang]}</td>
                <td><span class="type-badge ${product.type === '料理' ? 'type-food' : 'type-wine'}">${currentLang === 'zh' ? product.type : (product.type === '料理' ? 'Food' : 'Wine')}</span></td>
                <td>${levelDisplay}</td>
                <td>${tagsHtml}</td>
                <td>${itemsHtml}</td>
            `;

            if (product.type === '料理') {
                foodTbody.appendChild(tr);
            } else {
                wineTbody.appendChild(tr);
            }
        });

        document.querySelectorAll('tbody .interactive-item').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                triggerHighlight(this.getAttribute('data-type'), this.getAttribute('data-value'));
            });
        });

        if (currentHighlightText) refreshHighlightUI();
    }

    function triggerHighlight(type, value) {
        if (currentHighlightText === value && currentHighlightType === type) {
            currentHighlightText = null;
            currentHighlightType = null;
        } else {
            currentHighlightText = value;
            currentHighlightType = type;
        }
        refreshHighlightUI();
    }

    function refreshHighlightUI() {
        const l = i18n[currentLang];
        
        document.querySelectorAll('#foodTableBody tr, #wineTableBody tr').forEach(row => {
            const idx = row.getAttribute('data-idx');
            const product = productData[idx];
            row.classList.remove('highlighted-row');
            
            let isRowMatch = false;
            if (currentHighlightText) {
                if (currentHighlightType === 'tag' && product.tags[currentLang].includes(currentHighlightText)) isRowMatch = true;
                else if (currentHighlightType === 'item') {
                    if (product.items['zh'].includes(currentHighlightText) || product.items[currentLang].some(i => i.replace(/[0-9]/g, '').trim() === currentHighlightText)) isRowMatch = true;
                }
            }
            if (isRowMatch) row.classList.add('highlighted-row');
        });

        document.querySelectorAll('#containerTableBody tr').forEach(row => {
            const key = row.getAttribute('data-container-key');
            const dbInfo = containerDatabase[key];
            row.classList.remove('highlighted-row');
            
            let isRowMatch = false;
            if (currentHighlightText && currentHighlightType === 'item') {
                if (key === currentHighlightText || dbInfo.recipe[currentLang].split('、').some(r => r.replace(/[0-9]/g, '').trim() === currentHighlightText)) {
                    isRowMatch = true;
                }
            }
            if (isRowMatch) row.classList.add('highlighted-row');
        });

        document.querySelectorAll('.interactive-item').forEach(el => {
            if (currentHighlightText && el.getAttribute('data-type') === currentHighlightType && el.getAttribute('data-value') === currentHighlightText) {
                el.classList.add('active-highlight');
            } else {
                el.classList.remove('active-highlight');
            }
        });

        document.querySelectorAll('.tag-label').forEach(label => {
            const tagValue = label.getAttribute('data-tag');
            if (currentHighlightText && currentHighlightType === 'tag' && tagValue === currentHighlightText) {
                label.classList.add('active-highlight');
            } else {
                label.classList.remove('active-highlight');
            }
        });
    }

    function handleLevelChange() {
        currentUserLevel = parseInt(document.getElementById('userLevelSelect').value);
        renderRareTagsAlert(); 
        renderTable();
        calculateLogic();
    }

    function calculateLogic() {
        const l = i18n[currentLang];
        const checkedLabels = document.querySelectorAll('.tag-label');
        const activeTags = [];
        
        checkedLabels.forEach(label => {
            const input = label.querySelector('input');
            if (input.checked) {
                label.classList.add('checked');
                activeTags.push(input.value);
            } else {
                label.classList.remove('checked');
            }
        });

        const recBox = document.getElementById('recommendBox');
        const recContent = document.getElementById('recommendContent');

        if (activeTags.length === 0) {
            recBox.style.display = 'none';
            return;
        }

        recBox.style.display = 'block';
        const availablePool = productData.filter(p => p.level <= currentUserLevel);

        let scoredProducts = availablePool.map(p => {
            const matchCount = p.tags[currentLang].filter(t => activeTags.includes(t)).length;
            return { ...p, matchCount };
        }).filter(p => p.matchCount > 0);

        scoredProducts.sort((a, b) => b.matchCount - a.matchCount || a.level - b.level);

        let html = "";
        if (scoredProducts.length === 0) {
            html = l.noMatch;
            recContent.innerHTML = html;
            return;
        }

        html += `<strong>${l.recSingle}</strong><br><ul style="margin:5px 0 15px 20px; padding:0;">`;
        const maxMatch = scoredProducts[0].matchCount;
        scoredProducts.forEach(p => {
            if (p.matchCount === maxMatch) {
                const shopHint = (p.level <= 2) ? ` <span style='color:#60a5fa;'>${l.shopPull}</span>` : "";
                const typeText = currentLang === 'zh' ? p.type : (p.type === '料理' ? 'Food' : 'Wine');
                html += `<li style="margin-bottom:4px;"><span style="color:#fff; font-weight:bold;">${p.name[currentLang]}</span> (${typeText}) - Lv.${p.level}${shopHint} <span class="match-badge">${currentLang === 'zh' ? '符合' : 'Match'} ${p.matchCount} ${currentLang === 'zh' ? '個標籤' : 'Tags'}</span></li>`;
            }
        });
        html += `</ul>`;

        html += `<strong>${l.recCombo}</strong><br>`;
        let uncoveredTags = [...activeTags];
        let comboList = [];
        let pool = availablePool.map(p => ({
            ...p,
            getMatches: function(tags) { return this.tags[currentLang].filter(t => tags.includes(t)); }
        }));

        while (uncoveredTags.length > 0) {
            pool.sort((a, b) => b.getMatches(uncoveredTags).length - a.getMatches(uncoveredTags).length || a.level - b.level);
            let best = pool[0];
            let matches = best ? best.getMatches(uncoveredTags) : [];
            if (!best || matches.length === 0) break; 

            comboList.push({ name: best.name[currentLang], level: best.level, covered: matches });
            uncoveredTags = uncoveredTags.filter(t => !matches.includes(t));
        }

        if (comboList.length > 0) {
            html += `<div style="background:#111827; padding:10px; border-radius:6px; border:1px solid #374151; margin-top:5px;">`;
            comboList.forEach((c, i) => {
                const shopHint = (c.level <= 2) ? ` <span style='color:#60a5fa; font-size:12px;'>${l.shopCanPull}</span>` : "";
                html += `${i+1}. <span style="color:#fbbf24; font-weight:bold;">${c.name}</span> - Lv.${c.level}${shopHint} → ${l.tagSolved}: <span style="color:#a7f3d0;">${c.covered.join('、')}</span><br>`;
            });
            if (uncoveredTags.length > 0) {
                html += `<span style="color:#ef4444; font-size:12px; font-weight:bold; display:block; margin-top:5px;">${l.tagUnsolved} [ ${uncoveredTags.join('、')} ]</span>`;
            }
            html += `</div>`;
        }
        recContent.innerHTML = html;
    }

    // 初始化啟動
    applyLanguage();
    rebuildTagUI();
    renderRareTagsAlert();
    renderTable();
</script>
